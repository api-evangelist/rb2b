- aid: rb2b:rb2b-identification-api
  name: RB2B Identification API
  tags:
    - Identity Resolution
    - Identification
    - IP Lookup
    - Hashed Email
    - Mobile Ad ID
    - B2B Data
  humanURL: https://www.rb2b.com/apis
  description: >-
    Credit-metered Identification endpoints that convert anonymous web
    signals (IP addresses and user agents) into business identifiers,
    including IP → HEM (hashed email), IP → MAID (mobile ad ID), and
    IP → Company Domain. Hosted on api.rb2b.com and accessed through the
    RB2B API Partner Program with its own account, credit balance, and
    Postman-based documentation. Person-level resolution is US-only;
    company-level resolution is global.
  properties:
