aid: rb2b
name: RB2B
description: >-
  RB2B is a US-focused B2B website visitor identification platform that
  resolves anonymous web traffic into person-level leads — names, LinkedIn
  profiles, hashed and plaintext business emails, mobile ad IDs, and full
  business profiles — and pushes them to sales, marketing, and ad-tech
  systems. The product is delivered as a JavaScript pixel plus a knowledge-
  base and pipeline of 50+ destination integrations (Slack, Microsoft Teams,
  Salesforce, HubSpot, Clay, Zapier, Apollo, Customer.io, Demandbase, and
  others), with global company-level identification and US-only person-
  level resolution. RB2B operates a separate API Partner Program at
  api.rb2b.com that exposes credit-metered Identification endpoints
  (IP → HEM, IP → MAID, IP → Company Domain) and Enrichment endpoints
  (HEM → LinkedIn, HEM → Business Profile, HEM → MAID, LinkedIn → Email,
  LinkedIn → Phone, Email → LinkedIn, Email → MAID) for SaaS developers,
  GTM engineers, retailers, and ad-tech platforms that want to embed
  identity resolution into their own apps and identity graphs. The platform
  is SOC 2 Type II certified.
