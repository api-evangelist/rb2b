- aid: rb2b:rb2b-pixel-webhooks
  name: RB2B Pixel and Destination Webhooks
  tags:
    - Pixel
    - JavaScript
    - Webhooks
    - Integrations
    - Tag Manager
  humanURL: https://support.rb2b.com/en/
  description: >-
    The RB2B JavaScript pixel installed in a site header (or via Google
    Tag Manager / Segment / RudderStack / Shopify / Webflow / WordPress /
    HubSpot CMS / Wix) is the primary data ingestion surface for RB2B.
    Resolved visitors are pushed downstream through a webhook and
    destination layer that fan out to 50+ ad, CRM, marketing-automation,
    enrichment, and orchestration tools — Slack, Microsoft Teams,
    Salesforce, HubSpot, Clay, Zapier, Customer.io, Apollo, Demandbase,
    Google Ads, Meta Ads, LinkedIn Ads, Webhook URLs, and others — based
    on the customer's tier and configuration.
  properties:
    - url: https://support.rb2b.com/en/
      type: Documentation
    - url: https://support.rb2b.com/en/articles/9061641-setup-guide-apollo-io
      type: IntegrationGuide
