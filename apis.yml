- aid: rb2b:rb2b-enrichment-api
  name: RB2B Enrichment API
  tags:
    - Enrichment
    - LinkedIn
    - Email
    - Phone
    - Business Profile
    - B2B Data
  humanURL: https://www.rb2b.com/apis
  description: >-
    Credit-metered Enrichment endpoints that take a known identifier
    (hashed email, LinkedIn URL, plaintext email, MAID, or company domain)
    and return additional B2B attributes — LinkedIn URL, full business
    profile, multiple personal or business emails, phone number, MAID, and
    firmographics. Designed for SaaS developers, GTM engineers, and ad-tech
    platforms that want to enrich their own identity graphs. Hosted on
    api.rb2b.com and accessed through the RB2B API Partner Program.
  properties:
    - url: https://www.rb2b.com/apis
      type: Documentation
    - url: https://postman.api.rb2b.com/
      type: Postman
    - url: https://ui.api.rb2b.com/login
